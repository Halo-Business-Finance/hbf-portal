name: Deploy Portal to IBM Code Engine

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'ibm-functions/**'
      - 'docs/hbf-api-starter/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  IBM_CLOUD_REGION: us-south
  ICR_NAMESPACE: hbf-portal
  ICR_REGISTRY: us.icr.io
  # PORTAL_APP_NAME is the ONLY Code Engine app this workflow may touch.
  # Changing this to any other app name (e.g. hbf-api) is FORBIDDEN.
  PORTAL_APP_NAME: hbf-portal
  CODE_ENGINE_PROJECT: Halo Business Finance

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 🚨 Collision guard – ensure we never touch hbf-api
        run: |
          set -euo pipefail
          APP="hbf-portal"
          if [ "$APP" != "hbf-portal" ]; then
            echo "🚨 FATAL: PORTAL_APP_NAME is '$APP' — this workflow may ONLY deploy 'hbf-portal'."
            echo "Aborting to prevent overwriting the hbf-api backend."
            exit 1
          fi
          echo "✅ Collision guard passed — deploying to '$APP' only."

      - name: Install IBM Cloud CLI
        run: |
          set -euo pipefail

          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud --version

          # Ensure plugin repository is present
          ibmcloud plugin repo-add ibmcloud https://plugins.cloud.ibm.com || true

          # Install required plugins
          ibmcloud plugin install container-registry -f
          ibmcloud plugin install code-engine -f

          # Update plugins (non-fatal if already latest)
          ibmcloud plugin update container-registry -f || true
          ibmcloud plugin update code-engine -f || true

          echo "=== Installed plugins ==="
          ibmcloud plugin list

      - name: Authenticate with IBM Cloud
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r ${{ env.IBM_CLOUD_REGION }}
          ibmcloud target -g "${{ secrets.IBM_RESOURCE_GROUP }}"

      - name: Select Code Engine project
        run: |
          ibmcloud ce project select --name "${{ env.CODE_ENGINE_PROJECT }}"

      - name: 🚨 Verify target app is hbf-portal (runtime check)
        run: |
          set -euo pipefail
          # Double-check the live app we're about to update is the portal, not the API
          APP_IMAGE=$(ibmcloud ce application get --name ${{ env.PORTAL_APP_NAME }} --output json 2>/dev/null | jq -r '.spec.template.spec.containers[0].image // empty' || echo "")
          if echo "$APP_IMAGE" | grep -qi "hbf-api"; then
            echo "🚨 COLLISION DETECTED: '${{ env.PORTAL_APP_NAME }}' is currently running an hbf-api image!"
            echo "   Current image: $APP_IMAGE"
            echo "   This workflow will NOT overwrite it. Aborting."
            exit 1
          fi
          echo "✅ Runtime check passed — '${{ env.PORTAL_APP_NAME }}' is not running an API image."

      - name: Build & Deploy portal from source
        timeout-minutes: 45
        env:
          DB_URL: ${{ secrets.IBM_DATABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          echo "Building portal from source using Code Engine managed build..."
          echo "Target app: ${{ env.PORTAL_APP_NAME }} (portal ONLY)"
          
          # Create .env file for Vite build (these are public/publishable keys)
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env.production
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY" >> .env.production
          echo "--- .env.production ---"
          cat .env.production
          
          ibmcloud ce application update \
            --name ${{ env.PORTAL_APP_NAME }} \
            --src . \
            --strategy dockerfile \
            --registry-secret icr-secret \
            --image "${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/${{ env.PORTAL_APP_NAME }}" \
            --env "DATABASE_URL=$DB_URL"

      - name: Wait for deployment to stabilize
        run: sleep 45

      - name: Health Check
        run: |
          APP_URL=$(ibmcloud ce application get --name ${{ env.PORTAL_APP_NAME }} --output json | jq -r '.status.url')
          echo "Application URL: $APP_URL"
          
          MAX_ATTEMPTS=5
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" --max-time 30 || echo "000")
            
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Health check passed! Portal is running correctly."
              exit 0
            fi
            
            echo "Response code: $RESPONSE - Waiting 15 seconds before retry..."
            sleep 15
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          exit 1
