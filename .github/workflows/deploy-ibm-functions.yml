name: Deploy IBM Functions to Code Engine

on:
  push:
    branches: [main]
    paths:
      - 'ibm-functions/**'
  workflow_dispatch:

env:
  IBM_REGION: us-south
  CE_PROJECT: Halo Business Finance
  APP_NAME: hbf-api
  REGISTRY: us.icr.io
  NAMESPACE: hbf-api
  IMAGE_NAME: hbf-api
  REGISTRY_SECRET: hbf-api-icr-secret

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install IBM Cloud CLI
        run: curl -fsSL https://clis.cloud.ibm.com/install/linux | sh

      - name: Install plugins
        run: |
          ibmcloud plugin install container-registry -f
          ibmcloud plugin install code-engine -f

      - name: Login to IBM Cloud
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r ${{ env.IBM_REGION }}
          ibmcloud target -g "${{ secrets.IBM_RESOURCE_GROUP }}"

      - name: Login to Container Registry
        run: ibmcloud cr login

      - name: Validate required deployment secrets
        env:
          IBM_DATABASE_URL: ${{ secrets.IBM_DATABASE_URL }}
          IBM_DB_CA_CERT: ${{ secrets.IBM_DB_CA_CERT }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          IBM_APPID_TENANT_ID: ${{ secrets.IBM_APPID_TENANT_ID }}
          IBM_APPID_CLIENT_ID: ${{ secrets.IBM_APPID_CLIENT_ID }}
          IBM_APPID_SECRET: ${{ secrets.IBM_APPID_SECRET }}
          IBM_APPID_OAUTH_SERVER_URL: ${{ secrets.IBM_APPID_OAUTH_SERVER_URL }}
          IBM_COS_API_KEY: ${{ secrets.IBM_COS_API_KEY }}
          IBM_COS_ENDPOINT: ${{ secrets.IBM_COS_ENDPOINT }}
          IBM_COS_BUCKET: ${{ secrets.IBM_COS_BUCKET }}
          IBM_COS_INSTANCE_ID: ${{ secrets.IBM_COS_INSTANCE_ID }}
        run: |
          missing=0
          for var in \
            IBM_DATABASE_URL \
            IBM_DB_CA_CERT \
            SUPABASE_JWT_SECRET \
            IBM_APPID_TENANT_ID \
            IBM_APPID_CLIENT_ID \
            IBM_APPID_SECRET \
            IBM_APPID_OAUTH_SERVER_URL \
            IBM_COS_API_KEY \
            IBM_COS_ENDPOINT \
            IBM_COS_BUCKET \
            IBM_COS_INSTANCE_ID
          do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Deployment aborted due to missing required secrets."
            exit 1
          fi

      - name: Build & push image
        working-directory: ibm-functions
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Select Code Engine project
        run: ibmcloud ce project select --name "Halo Business Finance" --endpoint public

      - name: Ensure Code Engine registry pull secret
        run: |
          if ibmcloud ce registry get --name ${{ env.REGISTRY_SECRET }} > /dev/null 2>&1; then
            ibmcloud ce registry delete --name ${{ env.REGISTRY_SECRET }} --force
          fi
          ibmcloud ce registry create \
            --name ${{ env.REGISTRY_SECRET }} \
            --server ${{ env.REGISTRY }} \
            --username iamapikey \
            --password "${{ secrets.IBM_CLOUD_API_KEY }}"

      - name: Deploy or update application
        run: |
          if ibmcloud ce app get --name ${{ env.APP_NAME }} > /dev/null 2>&1; then
            set +e
            UPDATE_OUTPUT=$(ibmcloud ce app update \
              --name ${{ env.APP_NAME }} \
              --build-clear \
              --image ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-secret ${{ env.REGISTRY_SECRET }} \
              --env DATABASE_URL="${{ secrets.IBM_DATABASE_URL }}" \
              --env IBM_DB_CA_CERT="${{ secrets.IBM_DB_CA_CERT }}" \
              --env JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
              --env IBM_CLOUD_API_KEY="${{ secrets.IBM_CLOUD_API_KEY }}" \
              --env IBM_APPID_TENANT_ID="${{ secrets.IBM_APPID_TENANT_ID }}" \
              --env IBM_APPID_CLIENT_ID="${{ secrets.IBM_APPID_CLIENT_ID }}" \
              --env IBM_APPID_SECRET="${{ secrets.IBM_APPID_SECRET }}" \
              --env IBM_APPID_OAUTH_SERVER_URL="${{ secrets.IBM_APPID_OAUTH_SERVER_URL }}" \
              --env IBM_COS_API_KEY="${{ secrets.IBM_COS_API_KEY }}" \
              --env IBM_COS_ENDPOINT="${{ secrets.IBM_COS_ENDPOINT }}" \
              --env IBM_COS_BUCKET="${{ secrets.IBM_COS_BUCKET }}" \
              --env IBM_COS_INSTANCE_ID="${{ secrets.IBM_COS_INSTANCE_ID }}" \
              --min-scale 1 \
              --max-scale 5 \
              --cpu 0.5 \
              --memory 1G \
              --port 8080 2>&1)
            UPDATE_EXIT=$?
            set -e

            if [ $UPDATE_EXIT -ne 0 ] && echo "$UPDATE_OUTPUT" | grep -q "'build-clear' is only allowed when a related build already exists"; then
              echo "Retrying app update without --build-clear..."
              ibmcloud ce app update \
                --name ${{ env.APP_NAME }} \
                --image ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                --registry-secret ${{ env.REGISTRY_SECRET }} \
                --env DATABASE_URL="${{ secrets.IBM_DATABASE_URL }}" \
                --env IBM_DB_CA_CERT="${{ secrets.IBM_DB_CA_CERT }}" \
                --env JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
                --env IBM_CLOUD_API_KEY="${{ secrets.IBM_CLOUD_API_KEY }}" \
                --env IBM_APPID_TENANT_ID="${{ secrets.IBM_APPID_TENANT_ID }}" \
                --env IBM_APPID_CLIENT_ID="${{ secrets.IBM_APPID_CLIENT_ID }}" \
                --env IBM_APPID_SECRET="${{ secrets.IBM_APPID_SECRET }}" \
                --env IBM_APPID_OAUTH_SERVER_URL="${{ secrets.IBM_APPID_OAUTH_SERVER_URL }}" \
                --env IBM_COS_API_KEY="${{ secrets.IBM_COS_API_KEY }}" \
                --env IBM_COS_ENDPOINT="${{ secrets.IBM_COS_ENDPOINT }}" \
                --env IBM_COS_BUCKET="${{ secrets.IBM_COS_BUCKET }}" \
                --env IBM_COS_INSTANCE_ID="${{ secrets.IBM_COS_INSTANCE_ID }}" \
                --min-scale 1 \
                --max-scale 5 \
                --cpu 0.5 \
                --memory 1G \
                --port 8080
            elif [ $UPDATE_EXIT -ne 0 ]; then
              echo "$UPDATE_OUTPUT"
              exit $UPDATE_EXIT
            else
              echo "$UPDATE_OUTPUT"
            fi
          else
            ibmcloud ce app create \
              --name ${{ env.APP_NAME }} \
              --image ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-secret ${{ env.REGISTRY_SECRET }} \
              --env DATABASE_URL="${{ secrets.IBM_DATABASE_URL }}" \
              --env IBM_DB_CA_CERT="${{ secrets.IBM_DB_CA_CERT }}" \
              --env JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
              --env IBM_CLOUD_API_KEY="${{ secrets.IBM_CLOUD_API_KEY }}" \
              --env IBM_APPID_TENANT_ID="${{ secrets.IBM_APPID_TENANT_ID }}" \
              --env IBM_APPID_CLIENT_ID="${{ secrets.IBM_APPID_CLIENT_ID }}" \
              --env IBM_APPID_SECRET="${{ secrets.IBM_APPID_SECRET }}" \
              --env IBM_APPID_OAUTH_SERVER_URL="${{ secrets.IBM_APPID_OAUTH_SERVER_URL }}" \
              --env IBM_COS_API_KEY="${{ secrets.IBM_COS_API_KEY }}" \
              --env IBM_COS_ENDPOINT="${{ secrets.IBM_COS_ENDPOINT }}" \
              --env IBM_COS_BUCKET="${{ secrets.IBM_COS_BUCKET }}" \
              --env IBM_COS_INSTANCE_ID="${{ secrets.IBM_COS_INSTANCE_ID }}" \
              --min-scale 1 \
              --max-scale 5 \
              --cpu 0.5 \
              --memory 1G \
              --port 8080
          fi

      - name: Health check
        run: |
          APP_URL=$(ibmcloud ce app get --name ${{ env.APP_NAME }} --output url)
          echo "Deployed at: $APP_URL"
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" || echo "000")
            echo "Health check attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Health check failed"
          exit 1
